site_name: Manual de usuario de AetherSDR
site_description: Documentación para usuarios de AetherSDR — cliente Qt6 nativo compatible con SmartSDR para cualquier transceptor FlexRadio con firmware SmartSDR v3.x o v4.x. Funciona en Linux, macOS y Windows sin Wine ni máquinas virtuales.
site_author: AetherSDR community
site_url: https://lu5dx.github.io/AetherSDRDocsSpanish/

repo_name: LU5DX/AetherSDRDocsSpanish
repo_url: https://github.com/LU5DX/AetherSDRDocsSpanish
edit_uri: edit/main/docs/

copyright: >
  Hecho con
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
       style="height:1em;width:1em;vertical-align:-0.15em;fill:#ef4444;
              filter:drop-shadow(0 0 4px rgba(239,68,68,0.6));"
       aria-label="amor">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
  </svg>
  por <a href="https://github.com/LU5DX" style="color:inherit;font-weight:600;">LU5DX</a>
