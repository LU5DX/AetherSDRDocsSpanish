theme:
  name: material
  custom_dir: overrides
  language: es
  logo: assets/aether-logo.png
  favicon: assets/aether-logo.png
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Cambiar a modo claro
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo oscuro
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.action.view
    - content.tooltips
    - announce.dismiss
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/parallax.js

plugins:
  - search:
      lang: es
  - tags

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tilde
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: false
  - pymdownx.keys

extra:
  alternate:
    - name: English
      link: https://lu5dx.github.io/AetherSDRDocsEnglish/
      lang: en
    - name: Español
      link: https://lu5dx.github.io/AetherSDRDocsSpanish/
      lang: es
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ten9876/AetherSDR
      name: AetherSDR en GitHub
    - icon: fontawesome/brands/github
      link: https://github.com/LU5DX/AetherSDRDocsSpanish
      name: Fuente de la documentación
  generator: false
