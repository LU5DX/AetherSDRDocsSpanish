# Build the MkDocs Material site and deploy to GitHub Pages.
#
# DISABLED auto-trigger: Pages is now sourced from the `gh-pages` branch
# managed by mike (multi-version docs). This workflow is kept for the
# `workflow_dispatch` manual button and as a reference for the build job,
# but it no longer auto-deploys. The deploy step would also fail under
# the new branch-based Pages source. To publish a new release run:
#   mike deploy --push --update-aliases <version> latest
# locally against the gh-pages branch.

name: Deploy docs

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for the git revision plugin if added later

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('mkdocs.yml') }}

      - name: Install MkDocs Material
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material pymdown-extensions mkdocs-awesome-pages-plugin

      - name: Build site
        run: mkdocs build --strict --verbose

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
