# Auto-deploys with mike when a regen PR is merged to main.
#
# Trigger: push to main that touches docs/, mkdocs.yml, or overrides/.
# (The PRs from the engine pipeline fork will produce these pushes.)
#
# What it does:
#   1. Detects the version tag by reading the commit message (format:
#      "regen para AetherSDR vX.Y.Z" or similar). Falls back to manual
#      input via workflow_dispatch.
#   2. Runs mike deploy --push --update-aliases <ver> latest
#
# Requires: the repo must have Pages source = gh-pages branch (already
# configured 2026-04-26).

name: Mike Deploy on Merge

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'overrides/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. 0.9.1, no v prefix). If empty, attempts to detect from commit.'
        required: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mike + mkdocs stack
        run: |
          pip install --upgrade pip
          pip install mkdocs-material pymdown-extensions mkdocs-awesome-pages-plugin mike

      - name: Detect version
        id: version
        env:
          INPUT: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT" ]; then
            VERSION="$INPUT"
          else
            MSG=$(git log -1 --pretty=%B)
            VERSION=$(echo "$MSG" | grep -oE 'v?[0-9]+\.[0-9]+\.[0-9]+' | head -1 | sed 's/^v//')
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not detect version from commit or input. Aborting."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Deploying version: $VERSION"

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Mike deploy
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mike deploy --push --update-aliases "$VERSION" latest
          mike set-default --push latest
