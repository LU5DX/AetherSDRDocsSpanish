<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="AetherSDR">
  <defs>
    <radialGradient id="aether-bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#060818"/>
    </radialGradient>
    <linearGradient id="aether-wave-bright" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#67e8f9" stop-opacity="0.3"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="aether-wave-deep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0e7490" stop-opacity="0.2"/>
      <stop offset="50%"  stop-color="#06b6d4" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="aether-drop" cx="50%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </radialGradient>
  </defs>

  <!-- Disc -->
  <circle cx="50" cy="50" r="48" fill="url(#aether-bg)"/>
  <circle cx="50" cy="50" r="48" fill="none" stroke="#67e8f9" stroke-width="0.5" opacity="0.35"/>

  <!-- Two crossing waves forming an abstract "A" -->
  <path d="M 10 62 Q 30 22, 50 50 T 90 62"
        stroke="url(#aether-wave-deep)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M 10 56 Q 30 78, 50 50 T 90 56"
        stroke="url(#aether-wave-bright)" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Droplet at bottom -->
  <path d="M 50 75 C 46 80, 46 86, 50 89 C 54 86, 54 80, 50 75 Z"
        fill="url(#aether-drop)"/>
</svg>
