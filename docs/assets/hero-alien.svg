<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" preserveAspectRatio="xMidYMax meet" aria-hidden="true">
  <defs>
    <linearGradient id="alien-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#1a1a2e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="cup-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#2a2a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <radialGradient id="cup-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Cyan halo behind the alien suggesting screen reflection -->
  <ellipse cx="400" cy="380" rx="320" ry="200" fill="url(#cup-glow)" opacity="0.7"/>

  <!-- Shoulders / torso silhouette (back view) -->
  <path d="M 80 900
           L 80 720
           Q 80 600 200 560
           Q 320 530 400 530
           Q 480 530 600 560
           Q 720 600 720 720
           L 720 900 Z"
        fill="url(#alien-grad)"/>

  <!-- Neck -->
  <path d="M 340 560
           Q 340 510 400 510
           Q 460 510 460 560 Z"
        fill="url(#alien-grad)"/>

  <!-- Head — bulbous oval, classic grey-alien shape from behind -->
  <ellipse cx="400" cy="370" rx="180" ry="220" fill="url(#alien-grad)"/>

  <!-- Slight neck dimple shadow -->
  <ellipse cx="400" cy="555" rx="50" ry="10" fill="#000000" opacity="0.5"/>

  <!-- Headphone band — arch over the top of the head -->
  <path d="M 240 280
           Q 400 130 560 280"
        stroke="#1f2937" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M 240 280
           Q 400 138 560 280"
        stroke="#374151" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Headphone cup — left -->
  <ellipse cx="218" cy="370" rx="58" ry="78" fill="url(#cup-grad)"/>
  <ellipse cx="218" cy="370" rx="42" ry="60" fill="#06b6d4" opacity="0.18"/>
  <ellipse cx="218" cy="370" rx="22" ry="32" fill="#06b6d4" opacity="0.35"/>

  <!-- Headphone cup — right -->
  <ellipse cx="582" cy="370" rx="58" ry="78" fill="url(#cup-grad)"/>
  <ellipse cx="582" cy="370" rx="42" ry="60" fill="#06b6d4" opacity="0.18"/>
  <ellipse cx="582" cy="370" rx="22" ry="32" fill="#06b6d4" opacity="0.35"/>

  <!-- Antennae / sensors on top -->
  <line x1="370" y1="160" x2="350" y2="80" stroke="#1f2937" stroke-width="6" stroke-linecap="round"/>
  <circle cx="350" cy="76" r="9" fill="#7c3aed" opacity="0.85"/>
  <line x1="430" y1="160" x2="450" y2="80" stroke="#1f2937" stroke-width="6" stroke-linecap="round"/>
  <circle cx="450" cy="76" r="9" fill="#67e8f9" opacity="0.85"/>
</svg>
